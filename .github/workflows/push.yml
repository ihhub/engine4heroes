name: Push

on:
  push:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  pages: write
  pull-requests: write

jobs:
  msvc:
    name: MSVC
    uses: ./.github/workflows/msvc.yml
  sonarcloud:
    name: SonarCloud Analyzer
    uses: ./.github/workflows/sonarcloud.yml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
